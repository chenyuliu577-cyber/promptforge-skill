name: Lint

on:
  push:
  pull_request:

jobs:
  prompt-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run prompt linter
        run: python scripts/lint_all.py
